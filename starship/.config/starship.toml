# Starship config — ported from spacefish
# Single-line prompt: user > dir > git > [language modules] > char

add_newline = false

format = """
$username\
$directory\
$git_branch\
$git_status\
$nodejs\
$dotnet\
$rust\
$golang\
$python\
$docker_context\
$cmd_duration\
$character"""

# --- User (always show, like SPACEFISH_USER_SHOW=always) ---
[username]
show_always = true
style_user = "#D27E99 bold"
style_root = "#D27E99 bold"
format = "[$user]($style) "

# --- Directory (no prefix, like SPACEFISH_DIR_PREFIX="") ---
[directory]
style = "#7AA89F bold"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = false
read_only = " "
read_only_style = "#FF9E64 bold"

# --- Git branch (no prefix, like SPACEFISH_GIT_PREFIX="") ---
[git_branch]
symbol = ""
style = "#957FB8 bold"
format = "[$symbol$branch]($style) "

# --- Git status (spacefish-style indicators) ---
[git_status]
style = "#FF9E64 bold"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# --- Language modules (kept minimal, like spacefish defaults) ---
[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"

[dotnet]
symbol = ".NET "
style = "bold blue"
format = "[$symbol($version )(🎯 $tfm )]($style)"
heuristic = true

[rust]
symbol = " "
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"

[python]
symbol = " "
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"

# --- Disabled (matches SPACEFISH_*_SHOW false) ---
[time]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "yellow"

# --- Prompt char ---
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
